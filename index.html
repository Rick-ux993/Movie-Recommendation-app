<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MoodFlix 🎬</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>🎬 MoodFlix</h1>
  <p>Select your mood and get movie recommendations</p>

  <div class="mood-container">
    <button onclick="getMovies('happy')">😄 Happy</button>
    <button onclick="getMovies('sad')">😢 Sad</button>
    <button onclick="getMovies('romantic')">❤️ Romantic</button>
    <button onclick="getMovies('excited')">🔥 Excited</button>
    <button onclick="getMovies('scared')">👻 Scared</button>
  </div>

  <div id="movies"></div>

  <script src="script.js"></script>
</body>
</html>
